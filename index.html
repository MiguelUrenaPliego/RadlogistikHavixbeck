<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Betriebliche Kurzstrecken &amp; B2B-Radlogistik in Havixbeck</title>
<style>
  :root {
    --accent: #00fe7d;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  }
  body {
    background: url('assets/title_bg.png') center center / cover no-repeat;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  #langSwitcher {
    position: fixed;
    top: 20px;
    right: 20px;
    background: rgba(255, 255, 255, 0.12);
    backdrop-filter: blur(4px);
    color: #fff;
    padding: 8px 14px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 15px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 6px;
    z-index: 50;
    border: 1px solid rgba(255,255,255,0.35);
    user-select: none;
  }
  #langSwitcher:hover { background: rgba(255,255,255,0.22); }

  header {
    padding: 60px 6vw 20px 6vw;
  }
  h1 {
    color: var(--accent);
    font-size: clamp(28px, 4vw, 46px);
    font-weight: 600;
    max-width: 900px;
    margin: 0;
    line-height: 1.2;
  }

  main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px 6vw 40px 6vw;
  }

  .cards {
    display: flex;
    gap: 32px;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 1200px;
  }

  .card {
    width: 320px;
    background: rgba(8, 25, 55, 0.55);
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 16px;
    overflow: hidden;
    cursor: pointer;
    text-decoration: none;
    color: #fff;
    box-shadow: 0 8px 24px rgba(0,0,0,0.35);
    transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
  }
  .card:hover {
    transform: translateY(-6px);
    box-shadow: 0 14px 32px rgba(0,0,0,0.45);
    border-color: var(--accent);
  }
  .card .cover {
    width: 100%;
    height: 190px;
    object-fit: cover;
    display: block;
    background: #0b2d5c;
  }
  .card .body {
    padding: 18px 20px;
  } 
  .card h2 {
    margin: 0;
    font-size: 20px;
    font-weight: 600;
    text-align: center;
  }

  footer {
    padding: 18px 6vw 28px 6vw;
    color: #fff;
    font-size: 14px;
    line-height: 1.5;
  }
  footer .authors { font-weight: 500; }
  footer .date-org { opacity: 0.8; margin-top: 4px; }
</style>
</head>
<body>

<div id="langSwitcher" onclick="toggleLanguage()" title="Sprache wechseln / Switch language">
  🌐 <span id="currentLangLabel">DE</span>
</div>

<header>
  <h1 data-i18n="title"></h1>
</header>  

<main>
  <div class="cards">
    <a class="card" href="loop_map.html">
      <img class="cover" src="assets/map_cover.jpg" alt="Map preview" />
      <div class="body">
        <h2 data-i18n="map_title"></h2>
      </div>
    </a>

    <a class="card" href="marp/presentation.html">
      <img class="cover" src="assets/presentation_cover.png" alt="Presentation preview" />
      <div class="body">
        <h2 data-i18n="presentation_title"></h2>
      </div>
    </a>

    <a class="card" href="report/latex/main.pdf">
      <img class="cover" src="assets/report_cover.png" alt="Report preview" />
      <div class="body">
        <h2 data-i18n="report_title"></h2>
      </div>
    </a>
  </div>
</main>

<footer>
  <div class="authors">Urs Eble · Miguel Ureña Pliego · Kana Mohammad</div>
  <div class="date-org">07.07.2026 &nbsp;·&nbsp; Frankfurt University of Applied Sciences</div>
</footer>

<script>
const TRANSLATIONS = {
  "de": {
    "title": "Betriebliche Kurzstrecken &amp; B2B-Radlogistik in Havixbeck",
    "map_title": "Karte",
    "presentation_title": "Präsentation",
    "report_title": "Bericht"
  },
  "en": {
    "title": "Short-Distance &amp; B2B Cycle Logistics in Havixbeck",
    "map_title": "Map",
    "presentation_title": "Presentation",
    "report_title": "Report"
  }
};

let currentLang = "de";

function applyLanguage(lang) {
  currentLang = lang;
  const dict = TRANSLATIONS[lang];
  document.querySelectorAll("[data-i18n]").forEach(el => {
    const key = el.getAttribute("data-i18n");
    if (dict[key] !== undefined) {
      el.innerHTML = dict[key];
    }
  });
  document.getElementById("currentLangLabel").textContent = lang.toUpperCase();
  document.documentElement.lang = lang;
}

function toggleLanguage() {
  applyLanguage(currentLang === "de" ? "en" : "de");
}

applyLanguage("de");
</script>

</body>
</html>
